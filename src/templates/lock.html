<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Lock Reference</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: sans-serif;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: #f5f5f5;
                padding: 1rem;
            }

            .card {
                width: 100%;
                max-width: 400px;
                background: white;
                border: 1px solid #ddd;
                border-radius: 12px;
                padding: 2rem;
            }

            h2 {
                font-size: 20px;
                font-weight: 500;
                margin-bottom: 0.25rem;
            }

            .subtitle {
                font-size: 13px;
                color: #888;
                margin-bottom: 1.5rem;
            }

            .field {
                margin-bottom: 1rem;
            }

            label {
                display: block;
                font-size: 13px;
                color: #555;
                margin-bottom: 6px;
            }

            input[type="text"],
            input[type="password"] {
                width: 100%;
                padding: 10px 12px;
                border: 1px solid #ddd;
                border-radius: 8px;
                font-size: 14px;
                outline: none;
            }

            input:focus {
                border-color: #888;
            }

            .password-wrapper {
                position: relative;
            }

            .password-wrapper input {
                padding-right: 80px;
            }

            .submit-btn {
                width: 100%;
                padding: 10px;
                background: #222;
                color: white;
                border: none;
                border-radius: 8px;
                font-size: 14px;
                font-weight: 500;
                cursor: pointer;
                margin-top: 0.5rem;
            }

            .submit-btn:hover {
                background: #444;
            }

            .footer {
                font-size: 13px;
                color: #888;
                text-align: center;
                margin-top: 1rem;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <h2>Referensi ke link ini di password</h2>
            <p class="subtitle">Masukkan password kamu untuk melanjutkan</p>

            {% if detail %}
            <p style="color: red; padding: 2; text-align: center">
                {{ detail }}
            </p>
            {% endif %}

            <form
                method="post"
                action="/unlock/{{ cut_url }}/?url_id={{ url_id }}"
            >
                <div class="field">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input
                            type="password"
                            name="password"
                            placeholder="Masukkan password"
                        />
                    </div>
                </div>

                <button type="submit" class="submit-btn">Masuk</button>
            </form>
        </div>
    </body>
</html>
