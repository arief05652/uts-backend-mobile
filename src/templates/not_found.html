<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 - Halaman Tidak Ditemukan</title>
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family: sans-serif;
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
                background-color: #f5f5f5;
                padding: 1rem;
            }

            .card {
                width: 100%;
                max-width: 400px;
                background: white;
                border: 1px solid #ddd;
                border-radius: 12px;
                padding: 2rem;
                text-align: center;
            }

            .code {
                font-size: 64px;
                font-weight: 500;
                color: #222;
                line-height: 1;
                margin-bottom: 0.5rem;
            }

            .divider {
                width: 40px;
                height: 1px;
                background: #ddd;
                margin: 1rem auto;
            }

            h2 {
                font-size: 18px;
                font-weight: 500;
                color: #222;
                margin-bottom: 0.5rem;
            }

            p {
                font-size: 13px;
                color: #888;
                margin-bottom: 1.5rem;
                line-height: 1.6;
            }
        </style>
    </head>
    <body>
        <div class="card">
            <p class="code">404</p>
            <div class="divider"></div>
            <h2>Halaman tidak ditemukan</h2>
            <p>Halaman yang kamu cari tidak ada atau sudah dipindahkan.</p>
        </div>
    </body>
</html>
